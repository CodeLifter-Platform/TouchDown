name: Build & Release

on:
  workflow_dispatch:        # Full pipeline (publish artifact + release) on demand

# ── Cost model ────────────────────────────────────────────────────
# TouchDown is a Blazor Server web app, so everything runs on cheap ubuntu
# runners. This pipeline runs ONLY on manual dispatch — day-to-day releases
# happen for free from a dev machine via scripts/release-local.sh.
# PR/push building lives in tests.yml.
# ──────────────────────────────────────────────────────────────────

permissions:
  contents: write          # Needed to create releases, tags, and push the README bump

# ── Continuous versioned releases — no manual tags ────────────────
#
#   BASE_VERSION  → repo variable (e.g. "0.9") = major.minor
#   PATCH         → GITHUB_RUN_NUMBER (auto-increments every run)
#   RELEASE_LEVEL → repo variable: "alpha" | "beta" | "rc" | "" (empty = stable)
#
#   main branch:    0.9.42-beta   (RELEASE_LEVEL=beta → GitHub prerelease)
#                   1.0.57        (RELEASE_LEVEL empty → clean stable release)
#   other branches: 0.9.42-pre.42+abc1234  (artifact-only, never released)
#
# To change the version line or graduate beta→stable:
#   Settings → Secrets and variables → Actions → Variables
#   (or: gh variable set BASE_VERSION --body "1.0"; gh variable set RELEASE_LEVEL --body "")
#
# No signing/notarization here: TouchDown ships as a server artifact (linux-x64
# publish zip), not a mac/windows desktop bundle.
# ──────────────────────────────────────────────────────────────────

jobs:
  # ── Compute version ────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      version_tag: ${{ steps.semver.outputs.version_tag }}
      is_release: ${{ steps.semver.outputs.is_release }}
      is_prerelease: ${{ steps.semver.outputs.is_prerelease }}
    steps:
      - name: Generate semantic version
        id: semver
        run: |
          BASE="${{ vars.BASE_VERSION || '0.9' }}"
          LEVEL="${{ vars.RELEASE_LEVEL || '' }}"
          PATCH="${{ github.run_number }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IS_MAIN="${{ github.ref == 'refs/heads/main' }}"

          if [ "$IS_MAIN" = "true" ]; then
            if [ -n "$LEVEL" ]; then
              VERSION="${BASE}.${PATCH}-${LEVEL}"
              IS_PRERELEASE="true"
            else
              VERSION="${BASE}.${PATCH}"
              IS_PRERELEASE="false"
            fi
            IS_RELEASE="true"
          else
            VERSION="${BASE}.${PATCH}-pre.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
            IS_RELEASE="false"
            IS_PRERELEASE="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          {
            echo "### Version: \`${VERSION}\`"
            echo "Release: ${IS_RELEASE} · Prerelease: ${IS_PRERELEASE}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build gates the release pipeline (no test project yet) ─────
  # (PR gating happens in tests.yml; this re-runs before any dispatch build)
  test:
    runs-on: ubuntu-latest  # linux minutes are the cheapest tier
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build TouchDown.sln -c Release

  # ── Linux server artifact (self-contained publish zip) ─────────
  build-linux:
    needs: [version, test]
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained, linux-x64)
        run: dotnet publish TouchDown/TouchDown.csproj -c Release -r linux-x64 --self-contained -p:Version="$APP_VERSION" -o publish

      - name: Zip
        run: (cd publish && zip -qr "../TouchDown-${APP_VERSION}-linux-x64.zip" .)

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: touchdown-linux
          path: TouchDown-*.zip
          if-no-files-found: error

  # ── Release (main dispatches only) ─────────────────────────────
  release:
    if: needs.version.outputs.is_release == 'true'
    needs: [version, build-linux]
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      VERSION_TAG: ${{ needs.version.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release history in README
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          DL="${REPO_URL}/releases/download/${VERSION_TAG}"
          NEW_ROW="| ${VERSION_TAG} | ${RELEASE_DATE} | [zip](${DL}/TouchDown-${APP_VERSION}-linux-x64.zip) | [Release notes](${REPO_URL}/releases/tag/${VERSION_TAG}) |"

          # Ensure the table exists (plain-dash separator row so the awk insert works).
          if ! grep -qE '\|[-]+\|[-]+\|[-]+\|[-]+\|' README.md; then
            {
              echo ""
              echo "## Release history"
              echo ""
              echo "| Version | Date | Linux (x64) | Notes |"
              echo "|---|---|---|---|"
            } >> README.md
          fi

          awk -v row="$NEW_ROW" '/\|[-]+\|[-]+\|[-]+\|[-]+\|/{print; print row; next} {print}' README.md > README.tmp && mv README.tmp README.md

      - name: Commit release bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: release ${APP_VERSION} [skip ci]"
          git tag "$VERSION_TAG"
          git push origin main --tags

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: touchdown-linux
          path: dist

      - name: List release files
        run: ls -lhR dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: "TouchDown ${{ env.VERSION_TAG }}"
          draft: false
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
